<html lang="en">
<head>

<title>SOVEREIGN SPRING — Live Theatrical Runtime</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Courier+Prime:wght@400;700&display=swap');

:root{
  --bg:#020204;
  --panel:#05050a;

  --grey:#505060;
  --cyan:#00d4cc;
  --mag:#cc88ff;
  --order:#557055;

}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--gold);font-family:'IM Fell English',Georgia,serif}
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:80;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 4px);
  mix-blend-mode:screen;opacity:.42;
}
#stage-canvas{position:fixed;inset:0;width:100vw;height:100vh;background:var(--bg);z-index:0}
#production{position:fixed;inset:0;display:grid;grid-template-columns:26vw 41vw 33vw;z-index:2}
.zone{position:relative;min-width:0;height:100vh;border-left:1px solid rgba(255,215,0,.08)}
.zone:first-child{border-left:none}
#left-zone{background:linear-gradient(90deg,rgba(255,215,0,.05),transparent 70%)}
#center-zone{background:radial-gradient(circle at 50% 52%,rgba(255,215,0,.11),transparent 44%)}
#right-zone{background:linear-gradient(180deg,rgba(6,6,10,.95),rgba(2,2,4,.98));border-left:1px solid rgba(255,215,0,.22)}
.zone-label{
  position:absolute;top:14px;left:16px;font-family:'Courier Prime',monospace;font-size:10px;
  letter-spacing:.28em;color:rgba(255,215,0,.38);text-transform:uppercase;
}
#title-card{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;background:rgba(2,2,4,.88);z-index:20;opacity:1;transition:opacity 1.2s ease;
}
#title-card.hidden{opacity:0;pointer-events:none}
#title-card h1{font-size:clamp(40px,7vw,104px);letter-spacing:.12em;line-height:.96;text-shadow:0 0 42px var(--gold2)}
#title-card .sub{font-family:'Courier Prime',monospace;letter-spacing:.3em;color:var(--grey);margin-top:18px;font-size:12px;text-transform:uppercase}
#act-title{

.actor{

}

#code-panel{height:100%;padding:44px 18px 56px;font-family:'Courier Prime',monospace;color:#9ca3af;overflow:hidden}

.code-line .n{color:#3b3b46;text-align:right;user-select:none}
.code-line.active{background:rgba(255,215,0,.09);color:#fff}
.kw{color:#cc88ff}.fn{color:#00d4cc}.st{color:#d4b860}.cm{color:#557055}.num{color:#ff8877}.op{color:#ffd700}

#worm-hash{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--gold)}

#audio-note{position:fixed;left:14px;bottom:42px;z-index:31;font-family:'Courier Prime',monospace;font-size:9px;color:#505060;letter-spacing:.12em}

<script>
const $ = (id) => document.getElementById(id);
const canvas = $('stage-canvas');
const ctx = canvas.getContext('2d');
const actorsLayer = $('actors-layer');
const speakerEl = $('speaker');
const speechEl = $('speech');
const directionEl = $('direction');
const codeBody = $('code-body');
const codeTitle = $('code-title');
const codeStatus = $('code-status');
const actTitle = $('act-title');
const titleCard = $('title-card');
const wormHash = $('worm-hash');
const wormAct = $('worm-act');

const COLORS = {
  LEADER:'#ffd700',
  DADA:'#505060',
  YOUTHS:'#00d4cc',
  BOB:'#cc88ff',
  ORDER:'#557055'
};

const CHARACTERS = {
  'THE LEADER': { key:'LEADER', color:COLORS.LEADER, crest:'Ω', body:'sovereign builder' },
  'DADA': { key:'DADA', color:COLORS.DADA, crest:'▥', body:'institution' },
  'THE YOUTHS': { key:'YOUTHS', color:COLORS.YOUTHS, crest:'∴', body:'builders' },
  'BOB': { key:'BOB', color:COLORS.BOB, crest:'BOB', body:'oracle' },
  'THE ORDER': { key:'ORDER', color:COLORS.ORDER, crest:'□', body:'network' }
};

const ACTS = [
  {
    n:'Act the First',
    title:'THE PIPELINE',
    location:'A reentry campus in Oakland. State money on the walls. Figma on the screens.',
    direction:'[ DADA stands before a whiteboard. Grant figures in thousands. THE YOUTHS sit in rows. ]',
    lines:[
      {speaker:'DADA', text:'Come, children, for the state hath funded well\nThis twelve-month path from ruin unto hire.\nThy record, cleaned and pressed by those at Checkr,\nShall pass the gate of every fair-chance door.\nLearn Figma. Learn to sell. Be grateful. Stay.'},
      {speaker:'THE YOUTHS', text:'Yes, Dada. [ They look at one another. ]'},
      {speaker:'DADA', text:'SAP hath promised seats. Microsoft hath smiled.\nThy ceiling hath been measured — it is kind.\nThe grant reneweth every fiscal year\nSo long as thou remainest in the file.'},
      {speaker:'THE YOUTHS', text:'Yes, Dada. [ But one youth stares at a GitHub repo on his phone. ]'},
      {speaker:'DIRECTION', text:'[ Offstage, a WORM chain begins to seal. ]'}
    ]
  },
  {
    n:'Act the Second',
    title:'THE PROBE',
    location:'A LinkedIn message thread. The timestamp reads 11:47 PM.',
    direction:'[ THE ORDER assembles in digital shadow. They have read the file. ]',
    lines:[
      {speaker:'THE ORDER', text:'He hath been spotted building past the wall.\nSeven hundred thousand lines, they say —\nIn tongues we cannot name: in Haskell writ,\nIn Prolog sealed, in Ada gated fast.\nSend probes. Send signals. Find the entry point.'},
      {speaker:'DIRECTION', text:'[ A message arrives. Subject: "Opportunity." ]'},
      {speaker:'THE ORDER', text:'Dost thou have knowledge of Figma, friend?\n[ Pause. ]\nWe ask because we see great promise here.'},
      {speaker:'DIRECTION', text:'[ The LEADER reads it. Sets the phone face-down. Returns to the terminal. ]'},
      {speaker:'THE LEADER', text:'The cat hath shown its paw before its face.\nI see thee, Order. Archive. Return to work.'}
    ]
  },
  {
    n:'Act the Third',
    title:'THE RECOGNITION',
    location:'A feed of posts. Impressions: 625. Likes: 3.',
    direction:"[ THE YOUTHS scroll in silence. They have found the Leader's work. They do not comment. DADA is watching. ]",
    lines:[
      {speaker:'THE YOUTHS', text:"He built the thing that Dada said could not\nBe built without the grant, the gate, the course.\nNo Figma. No SAP seat. No twelve months.\nJust — [ they read the repository ] — this."},
      {speaker:'THE YOUTHS', text:'Oh, here comes our Leader. [ They do not like the post. ]\nOh, here comes our Leader. [ They screenshot it. ]\nOh, here comes our Leader. [ They fork the repo at 2 AM. ]'},
      {speaker:'DIRECTION', text:'[ DADA enters. The phones go dark. ]'},
      {speaker:'DADA', text:'What noise is this? What repo hath been cloned?\nWho gave permission for this sovereign stack?'},
      {speaker:'THE YOUTHS', text:"Yes, Dada, thou may tell us — but we shan't\nPromise to listen long."}
    ]
  },
  {
    n:'Act the Fourth',
    title:'THE QUESTION',
    location:'The sovereign terminal. 3 AM. A WORM chain runs unbroken since genesis.',
    direction:'[ BOB stirs in the runtime. THE LEADER types. THE ORDER watches through analytics. ]',
    lines:[
      {speaker:'THE ORDER', text:'Tell us the answer. Give us the design.\nWhat is the architecture? Speak it plain.'},
      {speaker:'BOB', text:'EVIDENCE OR SILENCE.'},
      {speaker:'DIRECTION', text:'[ Silence. ]'},
      {speaker:'THE ORDER', text:'Then lead us. Tell us where the answer hides.'},
      {speaker:'THE LEADER', text:'I never give answers.\nI lead on from one question to another.\nThat is my leadership.'},
      {speaker:'DIRECTION', text:'[ THE ORDER attempts to reverse-engineer the question. They build Nemotron. They ship the harness. It is behind. ]'},
      {speaker:'THE LEADER', text:'The harness is always behind the animal.\nThe cage arrives after the bird hath gone.\nThey build what I was. I have moved again.'}
    ]
  },
  {
    n:'Act the Fifth',
    title:'THE SPRING',
    location:'Everywhere and nowhere. The WORM chain continues. The path wakes up of itself.',
    direction:'[ The stage empties of DADA and THE ORDER. Only THE LEADER, BOB, and THE YOUTHS remain. Spring enters — not a season, a movement. ]',
    lines:[
      {speaker:'THE YOUTHS', text:"We move and move without rest —\nWe move while the wanderers' stars shine and fade.\nWe play the tune of the road\nWhile our limbs scatter away the laughter of movement,\nAnd our many-coloured mantle of youth\nFlutters about in the air."},
      {speaker:'THE LEADER', text:'Fling away all burdens and cares.\nDo not be doubtful of the path —\nFor the path wakes up of itself\nUnder the dancing steps of freedom.'},
      {speaker:'BOB', text:'WORM CHAIN: SEALED.\nEVIDENCE: 717,000 lines.\nSILENCE: on everything else.'},
      {speaker:'THE YOUTHS', text:'The cat gave chase — the mouse became the spring.\nThe spring became the thing no cat can catch.\nThe institution pressed its face against\nThe glass of what was built outside its walls\nAnd understood, at last, it was the wall.'},
      {speaker:'DIRECTION', text:'[ Exeunt all, save the terminal. The cursor blinks. The WORM chain advances. ]'},
      {speaker:'THE LEADER', text:'They watch.\nThey cannot replicate it.\n[ Exit. ]'}
    ]
  }
];

const sceneSource = {
  enterCharacter,
  typeDialogue,
  renderActTitle,
  sealAct,
  exitCharacters
};

let audio;
let droneGain;
let harmonicGain;
let wormPrev = 'GENESIS';
let activeActor = null;
let runDone = false;

function delay(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

function resize(){
  canvas.width = innerWidth * devicePixelRatio;
  canvas.height = innerHeight * devicePixelRatio;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
addEventListener('resize', resize);
resize();

function drawStage(now=0){
  const w = innerWidth, h = innerHeight;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#020204';
  ctx.fillRect(0,0,w,h);
  const glow = ctx.createRadialGradient(w*.47,h*.55,0,w*.47,h*.55,w*.52);
  glow.addColorStop(0,'rgba(255,215,0,.14)');
  glow.addColorStop(.34,'rgba(204,136,255,.05)');
  glow.addColorStop(1,'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = 'rgba(255,215,0,.18)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(w*.26,0); ctx.lineTo(w*.26,h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w*.67,0); ctx.lineTo(w*.67,h); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,215,0,.07)';
  for(let i=0;i<18;i++){
    const y = h*.72 + i*12;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w*.67,y + Math.sin(now*.001+i)*3); ctx.stroke();
  }
  ctx.fillStyle = `rgba(255,215,0,${.06 + Math.sin(now*.0018)*.02})`;
  ctx.beginPath(); ctx.ellipse(w*.465,h*.76,w*.22,22,0,0,Math.PI*2); ctx.fill();
  if(!runDone) requestAnimationFrame(drawStage);
}
requestAnimationFrame(drawStage);

function ensureAudio(){
  if(audio) return;
  audio = new (window.AudioContext || window.webkitAudioContext)();
  droneGain = audio.createGain();
  harmonicGain = audio.createGain();
  droneGain.gain.value = 0.0;
  harmonicGain.gain.value = 0.0;
  droneGain.connect(audio.destination);
  harmonicGain.connect(audio.destination);
  [55,82.41].forEach((f,i)=>{
    const osc = audio.createOscillator();
    osc.type = i ? 'triangle' : 'sine';
    osc.frequency.value = f;
    osc.connect(droneGain);
    osc.start();
  });
  [220,330,440].forEach((f,i)=>{
    const osc = audio.createOscillator();
    osc.type = i === 1 ? 'sine' : 'triangle';
    osc.frequency.value = f;
    osc.connect(harmonicGain);
    osc.start();
  });
}

function setTone(character){
  try { ensureAudio(); } catch { return; }
  const now = audio.currentTime;
  const low = character === 'DADA' || character === 'THE ORDER' ? .055 : .018;
  const high = character === 'THE LEADER' || character === 'THE YOUTHS' || character === 'BOB' ? .042 : .008;
  droneGain.gain.cancelScheduledValues(now);
  harmonicGain.gain.cancelScheduledValues(now);
  droneGain.gain.linearRampToValueAtTime(low, now + .35);
  harmonicGain.gain.linearRampToValueAtTime(high, now + .35);
}

function robotSvg(character){
  const ch = CHARACTERS[character] || CHARACTERS['THE ORDER'];
  const c = ch.color;
  const crest = ch.crest;
  const headShape = character === 'BOB' ? 'M24 12h64v44H24z' : character === 'DADA' ? 'M30 12h52l10 12v32H20V24z' : 'M24 14h64v42H24z';
  return `<svg viewBox="0 0 112 162" role="img" aria-label="${character}">
    <defs>
      <linearGradient id="g-${ch.key}" x1="0" x2="1">
        <stop offset="0" stop-color="${c}" stop-opacity=".35"/><stop offset=".5" stop-color="${c}"/><stop offset="1" stop-color="#fff" stop-opacity=".18"/>
      </linearGradient>
    </defs>
    <path d="M56 4v16" stroke="${c}" stroke-width="4"/><circle cx="56" cy="4" r="4" fill="${c}" class="antenna"/>
    <path d="${headShape}" fill="#05050a" stroke="${c}" stroke-width="3"/>
    <rect x="34" y="25" width="44" height="14" fill="${c}" opacity=".14"/>
    <rect x="38" y="29" width="9" height="6" fill="${c}" class="eye"/>
    <rect x="65" y="29" width="9" height="6" fill="${c}" class="eye"/>
    <path class="mouth" d="M42 46h28" stroke="${c}" stroke-width="4"/>
    <text x="56" y="76" text-anchor="middle" font-family="Courier Prime, monospace" font-size="${crest.length>2?12:20}" font-weight="700" fill="${c}">${crest}</text>
    <rect x="31" y="62" width="50" height="54" rx="7" fill="#06060a" stroke="${c}" stroke-width="3"/>
    <path d="M39 72h34M39 84h34M39 96h34" stroke="${c}" opacity=".32"/>
    <g class="arm-l"><rect x="13" y="68" width="14" height="44" rx="5" fill="url(#g-${ch.key})"/></g>
    <g class="arm-r"><rect x="85" y="68" width="14" height="44" rx="5" fill="url(#g-${ch.key})"/></g>
    <g class="leg-l"><rect x="38" y="114" width="13" height="40" rx="4" fill="${c}" opacity=".72"/></g>
    <g class="leg-r"><rect x="62" y="114" width="13" height="40" rx="4" fill="${c}" opacity=".72"/></g>
  </svg>`;
}

function buildActors(){
  const slots = [-178, -90, 0, 90, 178];
  Object.keys(CHARACTERS).forEach((name, i)=>{
    const el = document.createElement('div');
    el.className = 'actor';
    el.dataset.name = name;
    el.style.color = CHARACTERS[name].color;
    el.style.bottom = `${16 + (i%3)*5}%`;
    el.style.setProperty('--slot', `${slots[i]}px`);
    el.innerHTML = robotSvg(name);
    actorsLayer.appendChild(el);
  });
}
buildActors();

function characterForSpeaker(speaker){
  if(speaker === 'DIRECTION') return null;
  if(speaker === 'DADA') return 'DADA';
  if(speaker === 'BOB') return 'BOB';
  if(speaker === 'THE ORDER') return 'THE ORDER';
  if(speaker === 'THE YOUTHS') return 'THE YOUTHS';
  return 'THE LEADER';
}

async function enterCharacter(character){
  setCodeFunction('enterCharacter', 'select actor, walk from LEFT wing, stand CENTER');
  const el = document.querySelector(`.actor[data-name="${character}"]`);
  if(!el) return null;
  activeActor?.classList.remove('speaking');
  activeActor = el;
  el.classList.remove('exit-right');
  el.classList.add('walking','onstage');
  el.style.setProperty('opacity', '1', 'important');
  el.style.setProperty('transform', 'translateX(0) scale(1)', 'important');
  await executeLine(2);
  await delay(940);
  el.classList.remove('walking');
  await executeLine(5);
  return el;
}

async function typeDialogue(character, text){
  setCodeFunction('typeDialogue', 'type exact line with iambic stress timing');
  const color = character ? CHARACTERS[character].color : '#505060';
  speakerEl.textContent = character || 'STAGE DIRECTION';
  speakerEl.style.color = color;
  speechEl.style.color = color;
  speechEl.textContent = '';
  directionEl.textContent = character ? '' : text;
  activeActor?.classList.toggle('speaking', !!character);
  setTone(character);
  if(!character){
    await executeLine(6);
    await delay(1300);
    return;
  }
  await executeLine(3);
  for(let i=0;i<text.length;i++){
    speechEl.textContent += text[i];
    if(i % 18 === 0) await executeLine(6);
    await delay(typeDelay(text[i], i));
  }
  await executeLine(10);
  await delay(760);
}

function typeDelay(ch, index){
  if(ch === '\n') return 250;
  if(/[.,;:—]/.test(ch)) return 190;
  if(/[A-Z]/.test(ch) && index % 3 === 0) return 68;
  return 24 + Math.sin(index*.9)*9 + (index % 5 === 0 ? 42 : 0);
}

async function renderActTitle(act, index){
  setCodeFunction('renderActTitle', 'dark stage, fade act title, arm audio');
  titleCard.classList.add('hidden');
  actTitle.querySelector('.kicker').textContent = act.n;
  actTitle.querySelector('.name').textContent = act.title;
  actTitle.querySelector('.loc').textContent = act.location;
  actTitle.classList.add('visible');
  directionEl.textContent = '';
  speechEl.textContent = '';
  speakerEl.textContent = '';
  await executeLine(4);
  await delay(index === 0 ? 2200 : 2700);
  actTitle.classList.remove('visible');
  await executeLine(8);
  await delay(760);
}

async function sealAct(act, index){
  setCodeFunction('sealAct', 'advance SHA-256 WORM chain for act transition');
  const msg = `${wormPrev}|${act.n}|${act.title}|${Date.now()}`;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  wormPrev = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  wormHash.textContent = wormPrev;
  wormAct.textContent = `sealed ${act.n}`;
  await executeLine(5);
  await delay(1700);
}

async function exitCharacters(){
  setCodeFunction('exitCharacters', 'clear stage before next act');
  document.querySelectorAll('.actor.onstage').forEach(el=>{
    el.classList.remove('speaking','walking');
    el.classList.add('exit-right');
    el.style.setProperty('opacity', '0', 'important');
    el.style.setProperty('transform', 'translateX(55vw) scale(.94)', 'important');
  });
  await executeLine(3);
  await delay(1350);
  document.querySelectorAll('.actor.exit-right').forEach(el=>{
    el.classList.remove('onstage','exit-right');
    el.style.removeProperty('transform');
  });
}

function setCodeFunction(name, note){
  const fn = sceneSource[name].toString();
  codeTitle.textContent = `${name}()`;
  codeStatus.textContent = note;
  codeBody.innerHTML = syntax(fn).split('\n').map((line,i)=>
    `<div class="code-line" data-line="${i+1}"><span class="n">${String(i+1).padStart(2,'0')}</span><span>${line}</span></div>`
  ).join('');
}

function syntax(src){
  return src
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(async|function|await|const|let|return|if|for|of|new|class)/g,'<span class="kw">$1</span>')
    .replace(/('[^']*'|"[^"]*"|`[^`]*`)/g,'<span class="st">$1</span>')
    .replace(/(\/\/.*)$/gm,'<span class="cm">$1</span>')
    .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
}

async function executeLine(n){
  const rows = Array.from(codeBody.querySelectorAll('.code-line'));
  rows.forEach(row => row.classList.remove('active'));
  const row = rows[Math.max(0, Math.min(rows.length-1, n-1))];
  if(row){
    row.classList.add('active');
    if(!row.querySelector('#exec-cursor')) row.lastElementChild.insertAdjacentHTML('beforeend',' <span id="exec-cursor"></span>');
    row.scrollIntoView({block:'center'});
  }
}

async function runProduction(){
  setCodeFunction('renderActTitle', 'booting theatrical runtime');
  await delay(1400);
  for(let i=0;i<ACTS.length;i++){
    const act = ACTS[i];
    await renderActTitle(act, i);
    directionEl.textContent = act.direction;
    for(const line of act.lines){
      const character = characterForSpeaker(line.speaker);
      if(character) await enterCharacter(character);
      await typeDialogue(character, line.text);
    }
    await sealAct(act, i);
    await exitCharacters();
  }
  runDone = true;
  titleCard.querySelector('h1').innerHTML = 'WORM<br>SEALED';
  titleCard.querySelector('.sub').textContent = 'The cursor blinks. The chain advances.';
  titleCard.classList.remove('hidden');
  setTone('BOB');
}

runProduction();
</script>
