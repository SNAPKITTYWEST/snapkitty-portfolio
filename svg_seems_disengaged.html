<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seems Disengaged - Split Reality SVG</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: #111;
    display: grid;
    place-items: center;
  }
  svg {
    width: min(100vw, 1200px);
    height: auto;
    display: block;
    box-shadow: 0 18px 80px rgba(0,0,0,.45);
  }
  .sun-ray {
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    animation: rayDraw 2.8s ease forwards;
  }
  .confetti {
    animation: drift 4.8s ease-in-out infinite;
    transform-origin: center;
  }
  .confetti:nth-of-type(2n) { animation-delay: .7s; }
  .confetti:nth-of-type(3n) { animation-delay: 1.3s; }
  .field {
    opacity: 0;
    transform: translateX(18px);
    animation: fieldAppear .7s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .field-1 { animation-delay: .25s; }
  .field-2 { animation-delay: .65s; }
  .field-3 { animation-delay: 1.05s; }
  .field-4 { animation-delay: 1.45s; }
  .field-5 { animation-delay: 1.85s; }
  .field-6 { animation-delay: 2.25s; }
  .value {
    opacity: 0;
    animation: valueFill .35s ease forwards;
  }
  .field-1 .value { animation-delay: .55s; }
  .field-2 .value { animation-delay: .95s; }
  .field-3 .value { animation-delay: 1.35s; }
  .field-4 .value { animation-delay: 1.75s; }
  .field-5 .value { animation-delay: 2.15s; }
  .field-6 .value { animation-delay: 2.55s; }
  .monitor {
    animation: monitorPulse 1.45s ease-in-out infinite;
    animation-delay: 2.1s;
  }
  .tendril {
    stroke-dasharray: 8 13;
    animation: tendrilFlow 3.2s linear infinite;
  }
  .tendril-soft {
    animation-delay: .8s;
  }
  .bar-fill {
    transform: scaleX(0);
    transform-origin: 823px 424px;
    animation: barFill 2.8s ease forwards;
    animation-delay: 2.7s;
  }
  .record-scan {
    animation: scanMove 3.2s linear infinite;
  }
  .wall-box {
    animation: wallBlink 4s ease-in-out infinite;
  }
  .wall-box:nth-of-type(2n) { animation-delay: .55s; }
  .wall-box:nth-of-type(3n) { animation-delay: 1.1s; }
  @keyframes rayDraw { to { stroke-dashoffset: 0; } }
  @keyframes drift {
    0%,100% { transform: translateY(0) rotate(0deg); opacity: .95; }
    50% { transform: translateY(-8px) rotate(12deg); opacity: .58; }
  }
  @keyframes fieldAppear {
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes valueFill {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes monitorPulse {
    0%,100% { opacity: 1; filter: drop-shadow(0 0 0 rgba(255,68,68,0)); }
    50% { opacity: .7; filter: drop-shadow(0 0 10px rgba(255,68,68,.75)); }
  }
  @keyframes tendrilFlow {
    to { stroke-dashoffset: -126; }
  }
  @keyframes barFill {
    to { transform: scaleX(1); }
  }
  @keyframes scanMove {
    from { transform: translateY(-55px); }
    to { transform: translateY(170px); }
  }
  @keyframes wallBlink {
    0%,100% { opacity: .54; }
    50% { opacity: .9; }
  }
</style>
</head>
<body>
<svg viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">Split reality: motivational promise versus surveillance record</title>
  <desc id="desc">A warm motivational scene on the left is divided from a cold data-record scene on the right, showing the same person described as seems disengaged.</desc>

  <defs>
    <linearGradient id="warmBg" x1="0" y1="0" x2="0" y2="1">

    <radialGradient id="warmGlow" cx="50%" cy="52%" r="58%">

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">

    <filter id="tealGlow" x="-40%" y="-40%" width="180%" height="180%">

    <clipPath id="rightClip"><rect x="600" y="0" width="600" height="630"/></clipPath>
  </defs>

  <rect x="0" y="0" width="600" height="630" fill="url(#warmBg)"/>
  <rect x="0" y="0" width="600" height="630" fill="url(#warmGlow)"/>
  <rect x="600" y="0" width="600" height="630" fill="#0a0a0a"/>
  <rect x="600" y="0" width="600" height="630" fill="url(#coldGlow)"/>

  <!-- LEFT: motivational poster truth -->

  <g filter="url(#softShadow)">

    <path d="M190 168 Q188 208 225 215" fill="none" stroke="#c8860b" stroke-width="2"/>
    <text x="292" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="21" font-style="italic" fill="#8b6914" letter-spacing=".3">
      YOU ARE CHANGING THE WORLD
    </text>
  </g>

  <g transform="translate(292 326)" fill="#c8860b" stroke="#8b6914" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">

    <path d="M-44 -70 Q0 -94 44 -70 L30 84 Q0 105 -30 84 Z" fill="#c8860b"/>

  </g>

  <text x="300" y="575" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8b6914" opacity=".72">
    promise spoken aloud
  </text>

  <!-- CENTER DIVIDE: bureaucratic membrane -->
  <rect x="599" y="0" width="2" height="630" fill="#555"/>
  <g stroke="#cccccc" stroke-width="1">

    <g class="wall-box"><rect x="584" y="92" width="32" height="22" fill="#ecd9a9"/><rect x="600" y="92" width="16" height="22" fill="#222"/></g>

    <g class="wall-box"><rect x="584" y="244" width="32" height="22" fill="#ead7a3"/><rect x="600" y="244" width="16" height="22" fill="#232323"/></g>
    <g class="wall-box"><rect x="584" y="282" width="32" height="22" fill="#f5f0e0"/><rect x="600" y="282" width="16" height="22" fill="#121212"/></g>
    <g class="wall-box"><rect x="584" y="320" width="32" height="22" fill="#ead7a3"/><rect x="600" y="320" width="16" height="22" fill="#242424"/></g>

    <g class="wall-box"><rect x="584" y="396" width="32" height="22" fill="#ead7a3"/><rect x="600" y="396" width="16" height="22" fill="#232323"/></g>
    <g class="wall-box"><rect x="584" y="434" width="32" height="22" fill="#f5f0e0"/><rect x="600" y="434" width="16" height="22" fill="#101010"/></g>
    <g class="wall-box"><rect x="584" y="472" width="32" height="22" fill="#ead7a3"/><rect x="600" y="472" width="16" height="22" fill="#242424"/></g>
    <g class="wall-box"><rect x="584" y="510" width="32" height="22" fill="#f5f0e0"/><rect x="600" y="510" width="16" height="22" fill="#101010"/></g>
  </g>

  <!-- RIGHT: record extraction truth -->

      <path class="tendril tendril-soft" d="M776 260 C840 250 838 188 887 184"/>
      <path class="tendril" d="M782 302 C850 298 846 248 887 248"/>
      <path class="tendril tendril-soft" d="M770 344 C836 350 842 314 887 312"/>

    <g transform="translate(738 318)" fill="#111" stroke="#888" stroke-width="2">
      <rect x="-58" y="-94" width="116" height="188" rx="10" fill="#0d0d0d"/>
      <circle cx="0" cy="-132" r="34" fill="#101010"/>

    <g font-family="Courier New, monospace" font-size="14">

        <rect x="823" y="452" width="282" height="10" fill="#222" stroke="#444"/>
        <rect class="bar-fill" x="823" y="452" width="282" height="10" fill="#00d4cc"/>
        <text class="value" x="1117" y="463" text-anchor="end" fill="#00d4cc" font-weight="700">MODEL UPDATED</text>

    <g font-family="Courier New, monospace" font-size="10" fill="#555">

      <text x="1136" y="578" text-anchor="end">WORM SEAL: 83c34fa2d5a9b71e4f6c0a92b8e1d443f02a7c9eed5b6a10c4d8f137beef2026</text>

  <rect x="599" y="0" width="2" height="630" fill="#cccccc" opacity=".7"/>
