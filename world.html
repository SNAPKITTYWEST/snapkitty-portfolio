    position: fixed; font-size: 0.6rem; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); opacity: 0;

  #sl-static   { top: 28%; right: 12%; }
  #sl-secure   { bottom: 28%; left: 12%; }
  #sl-synthetic{ bottom: 28%; right: 12%; }

    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; gap: 0; border-top: 1px solid rgba(201,168,76,0.2);

  .stat-cell:last-child { border-right: none; }
  .stat-num {
    display: block; font-size: 1.4rem; font-weight: 900;
    color: var(--gold); letter-spacing: -0.02em; line-height: 1;
  }
  .stat-label {
    display: block; font-size: 0.55rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--dim); margin-top: 4px;
  }

  /* ── AGENT PANEL (slide in on click) ── */
  #agent-panel {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 360px; background: var(--panel-bg);
    border-left: 1px solid rgba(201,168,76,0.3);
    backdrop-filter: blur(20px);

    overflow-y: auto;

  #panel-close {
    position: absolute; top: 28px; right: 28px;
    background: none; border: none; color: var(--dim);
    font-size: 1.2rem; cursor: pointer; padding: 8px;
    pointer-events: all;

  #panel-close:hover { color: var(--white); }
  #panel-sector {
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 12px;

  #panel-name {
    font-size: 2.8rem; font-weight: 900; line-height: 1;
    text-transform: uppercase; margin-bottom: 8px;
  }
  #panel-role {
    font-size: 0.85rem; color: var(--dim); margin-bottom: 28px;
    line-height: 1.5;
  }
  #panel-divider {
    height: 1px; background: rgba(201,168,76,0.3); margin-bottom: 24px;

  #panel-achievement {
    font-size: 0.9rem; line-height: 1.7; color: rgba(255,255,255,0.85);

  .panel-tag {

// ── GSAP-LIKE ANIMATION via simple tween util ─────────────────────────────
function tween(obj, props, duration, delay=0, ease='out') {
  const start = {};
  for(const k in props) start[k] = obj[k];
  let elapsed = -delay;
  const fn = (dt) => {
    elapsed += dt;
    if(elapsed < 0) return true;
    let t = Math.min(elapsed/duration, 1);
    // Elastic ease out
    if(ease === 'elastic') {
      const c4 = (2*Math.PI)/3;
      t = t===0?0:t===1?1:-Math.pow(2,10*t-10)*Math.sin((t*10-10.75)*c4);
      t = 1+t; // flip
    } else {
      t = 1 - Math.pow(1-t, 3); // cubic out
    }
    for(const k in props) obj[k] = start[k] + (props[k]-start[k])*t;
    return elapsed < duration+delay;
  };
  return fn;
}

    setTimeout(() => {
      statsBar.style.transition = 'opacity 0.8s ease';
      statsBar.style.opacity = '1';
      // Animate WORM seal counter
      let n = 0;
      const target = 1247;
      const interval = setInterval(() => {
        n += 37;
        if(n >= target) { n = target; clearInterval(interval); }
        document.getElementById('sn-seals').textContent = n.toLocaleString();
      }, 30);
    }, 1200);

    setTimeout(() => {
      backLink.style.transition = 'opacity 0.6s ease';
      backLink.style.opacity = '1';
      scrollHint.style.transition = 'opacity 0.6s ease';
      scrollHint.style.opacity = '0.5';
    }, 1800);

    introComplete = true;
  }, 2800);
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────
let lastTime = 0;
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime), 50);
  lastTime = now;
  const t = now * 0.001;

  // Run tweens
  for(let i = tweens.length-1; i>=0; i--) {
    if(!tweens[i](dt)) tweens.splice(i,1);
  }

  // Core node spin
  coreNode.rotation.y = t * 0.5;
  coreNode.rotation.x = t * 0.3;

  // Agent bob animation
  if(introComplete) {
    agentMeshes.forEach((mesh, i) => {
      const baseY = AGENTS[i].pos[1];
      mesh.position.y = baseY + Math.sin(t * 0.8 + i * 0.9) * 0.08;
      mesh.rotation.y = t * 0.2 + i * 0.5;
    });
  }

  // Flow particles
  if(introComplete) {
    flowParticles.forEach((p, i) => {
      p.userData.t = (p.userData.t + 0.004) % 1;
      p.position.lerpVectors(p.userData.start, p.userData.end, p.userData.t);
    });
  }

  // Raycasting hover
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(agentMeshes);
  if(hits.length > 0) {
    const idx = hits[0].object.userData.agentIndex;
    if(idx !== hoveredIdx) {
      if(hoveredIdx >= 0) agentMeshes[hoveredIdx].material.emissiveIntensity = 0.8;
      hoveredIdx = idx;
      agentMeshes[idx].material.emissiveIntensity = 2.5;
      tooltip.textContent = AGENTS[idx].name;
      tooltip.style.opacity = '1';
      renderer.domElement.style.cursor = 'pointer';
    }
  } else {
    if(hoveredIdx >= 0) {
      agentMeshes[hoveredIdx].material.emissiveIntensity = 0.8;
      hoveredIdx = -1;
    }
    tooltip.style.opacity = '0';
    renderer.domElement.style.cursor = 'default';
  }

  // Pulse core
  const pulse = 1 + Math.sin(t*2)*0.15;
  coreNode.scale.set(pulse, pulse, pulse);
  ptLight.intensity = 2.5 + Math.sin(t*1.5)*0.8;

  controls.update();
  composer.render();
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

animate(0);
runIntroSequence();
</script>
